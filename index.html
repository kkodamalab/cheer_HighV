<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ハイブイ評価</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b1020;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    video, canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      pointer-events: none;
    }

    #controlRow {
      pointer-events: auto;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #countdownOverlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
      color: #fff;
      font-size: 28vw;
      font-weight: bold;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    #info {
      background: rgba(0, 0, 0, 0.68);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 18px;
      line-height: 1.5;
      min-width: 220px;
    }

    #advice {
      background: rgba(0, 0, 0, 0.68);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 18px;
      line-height: 1.5;
      min-width: 220px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body>
  <div id="stage">
    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="countdownOverlay">5</div>

    <div id="ui">
      <div id="controlRow">
        <button id="startCameraBtn">カメラ開始</button>
        <button id="evalBtn" disabled>5秒後に評価</button>
        <button id="resumeBtn" disabled>ライブに戻る</button>
      </div>
      <div id="info">開始ボタンを押してください</div>
      <div id="advice">アドバイス: -</div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const info = document.getElementById("info");
    const adviceEl = document.getElementById("advice");
    const startCameraBtn = document.getElementById("startCameraBtn");
    const evalBtn = document.getElementById("evalBtn");
    const resumeBtn = document.getElementById("resumeBtn");
    const countdownOverlay = document.getElementById("countdownOverlay");

    let pose = null;
    let stream = null;
    let running = false;
    let speakingCooldown = 0;

    let frozenCanvas = null;
    let frozenMode = false;
    let countdownActive = false;

    function angle(a, b, c) {
      const ab = [a.x - b.x, a.y - b.y];
      const cb = [c.x - b.x, c.y - b.y];
      const dot = ab[0] * cb[0] + ab[1] * cb[1];
      const magA = Math.hypot(ab[0], ab[1]);
      const magC = Math.hypot(cb[0], cb[1]);
      const cos = Math.max(-1, Math.min(1, dot / (magA * magC)));
      return Math.acos(cos) * 180 / Math.PI;
    }

    function lineAngleDeg(p1, p2) {
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      return Math.atan2(dy, dx) * 180 / Math.PI;
    }

    function normalizeAngleDiff(deg) {
      let d = deg;
      while (d > 180) d -= 360;
      while (d < -180) d += 360;
      return d;
    }

    function pointFromAngle(start, lengthPx, angleDeg) {
      const rad = angleDeg * Math.PI / 180;
      return {
        x: start.x + lengthPx * Math.cos(rad),
        y: start.y + lengthPx * Math.sin(rad),
      };
    }

    function speak(text) {
      const now = Date.now();
      if (now - speakingCooldown < 2500) return;
      speakingCooldown = now;
      if (!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const uttr = new SpeechSynthesisUtterance(text);
      uttr.lang = "ja-JP";
      window.speechSynthesis.speak(uttr);
    }

    function resizeCanvasToVideo() {
      canvas.width = video.videoWidth || 720;
      canvas.height = video.videoHeight || 1280;
    }

    async function waitForVideoReady(videoEl) {
      if (videoEl.readyState >= 2 && videoEl.videoWidth > 0) return;
      await new Promise((resolve) => {
        const done = () => {
          videoEl.removeEventListener("loadeddata", done);
          videoEl.removeEventListener("loadedmetadata", done);
          resolve();
        };
        videoEl.addEventListener("loadeddata", done, { once: true });
        videoEl.addEventListener("loadedmetadata", done, { once: true });
      });
    }

    function drawLine(p1, p2, color, width = 5, dash = []) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.setLineDash(dash);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
      ctx.restore();
    }

    function evaluateHighV(lm) {
      const lShoulder = lm[11];
      const lElbow = lm[13];
      const lWrist = lm[15];

      const rShoulder = lm[12];
      const rElbow = lm[14];
      const rWrist = lm[16];

      const lElbowAngle = angle(lShoulder, lElbow, lWrist);
      const rElbowAngle = angle(rShoulder, rElbow, rWrist);

      const lArmRaw = lineAngleDeg(lShoulder, lWrist);
      const rArmRaw = lineAngleDeg(rShoulder, rWrist);

      const idealLeftArm = -45;
      const idealRightArm = -135;

      const leftArmDiff = normalizeAngleDiff(lArmRaw - idealLeftArm);
      const rightArmDiff = normalizeAngleDiff(rArmRaw - idealRightArm);

      const leftElbowDiff = 180 - lElbowAngle;
      const rightElbowDiff = 180 - rElbowAngle;

      const armError = (Math.abs(leftArmDiff) + Math.abs(rightArmDiff)) / 2;
      const elbowError = (Math.abs(leftElbowDiff) + Math.abs(rightElbowDiff)) / 2;

      let adviceText = "とても良いです";
      if (elbowError > 15) {
        adviceText = "肘をもっと伸ばしてください";
      } else if (armError > 15) {
        adviceText = "腕をもっと斜め上に上げてください";
      }

      return {
        lShoulder, lElbow, lWrist,
        rShoulder, rElbow, rWrist,
        leftArmDiff, rightArmDiff,
        leftElbowDiff, rightElbowDiff,
        armError, elbowError,
        adviceText,
      };
    }

    function drawFrozenBackground() {
      if (!frozenCanvas) return;
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(frozenCanvas, 0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function drawIdealOverlay(evalData) {
      const {
        lShoulder, rShoulder,
        lElbow, rElbow,
        lWrist, rWrist,
      } = evalData;

      const leftLen = Math.hypot(
        (lWrist.x - lShoulder.x) * canvas.width,
        (lWrist.y - lShoulder.y) * canvas.height
      );
      const rightLen = Math.hypot(
        (rWrist.x - rShoulder.x) * canvas.width,
        (rWrist.y - rShoulder.y) * canvas.height
      );

      const lS = { x: lShoulder.x * canvas.width, y: lShoulder.y * canvas.height };
      const rS = { x: rShoulder.x * canvas.width, y: rShoulder.y * canvas.height };

      const idealLeftEnd = pointFromAngle(lS, leftLen, -45);
      const idealRightEnd = pointFromAngle(rS, rightLen, -135);

      drawLine(lS, idealLeftEnd, "yellow", 4, [10, 8]);
      drawLine(rS, idealRightEnd, "yellow", 4, [10, 8]);

      const lW = { x: lWrist.x * canvas.width, y: lWrist.y * canvas.height };
      const rW = { x: rWrist.x * canvas.width, y: rWrist.y * canvas.height };
      drawLine(lS, lW, "#00ff88", 6);
      drawLine(rS, rW, "#00ff88", 6);

      const lE = { x: lElbow.x * canvas.width, y: lElbow.y * canvas.height };
      const rE = { x: rElbow.x * canvas.width, y: rElbow.y * canvas.height };

      drawLine(lS, lE, "yellow", 3, [6, 6]);
      drawLine(lE, idealLeftEnd, "yellow", 3, [6, 6]);

      drawLine(rS, rE, "yellow", 3, [6, 6]);
      drawLine(rE, idealRightEnd, "yellow", 3, [6, 6]);
    }

    function renderEvaluation(results) {
      const evalData = evaluateHighV(results.poseLandmarks);

      drawFrozenBackground();

      drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {
        color: "#60a5fa",
        lineWidth: 4
      });
      drawLandmarks(ctx, results.poseLandmarks, {
        color: "#22c55e",
        fillColor: "#22c55e",
        radius: 4
      });
      drawIdealOverlay(evalData);

      info.innerHTML =
        `肘ズレ: ${evalData.elbowError.toFixed(1)}°<br>` +
        `腕ズレ: ${evalData.armError.toFixed(1)}°<br>` +
        `左腕ズレ: ${evalData.leftArmDiff.toFixed(1)}° / 右腕ズレ: ${evalData.rightArmDiff.toFixed(1)}°`;

      adviceEl.innerHTML = `アドバイス: ${evalData.adviceText}`;
      speak(evalData.adviceText);
    }

    function onResults(results) {
      if (!results.poseLandmarks) {
        if (!frozenMode && !countdownActive) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          info.innerHTML = "人物未検出";
          adviceEl.innerHTML = "アドバイス: -";
        }
        return;
      }

      if (countdownActive) {
        return;
      }

      if (!frozenMode) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {
          color: "#60a5fa",
          lineWidth: 4
        });
        drawLandmarks(ctx, results.poseLandmarks, {
          color: "#22c55e",
          fillColor: "#22c55e",
          radius: 4
        });
        info.innerHTML = "5秒後に評価 を押してください";
        adviceEl.innerHTML = "アドバイス: -";
      }
    }

    async function processLoop() {
      if (!running) return;

      if (video.readyState >= 2) {
        const results = await pose.send({ image: video });
      }

      requestAnimationFrame(processLoop);
    }

    async function startCamera() {
      try {
        startCameraBtn.disabled = true;
        info.textContent = "カメラを起動しています…";

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 720 },
            height: { ideal: 1280 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        await waitForVideoReady(video);
        resizeCanvasToVideo();

        pose = new Pose({
          locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        running = true;
        evalBtn.disabled = false;
        resumeBtn.disabled = true;
        info.textContent = "人物を映してください";
        processLoop();
      } catch (err) {
        console.error(err);
        info.innerHTML = "起動失敗<br>カメラ許可とHTTPSを確認";
        startCameraBtn.disabled = false;
      }
    }

    async function captureCurrentFrame() {
      frozenCanvas = document.createElement("canvas");
      frozenCanvas.width = video.videoWidth;
      frozenCanvas.height = video.videoHeight;
      const frozenCtx = frozenCanvas.getContext("2d");
      frozenCtx.drawImage(video, 0, 0, frozenCanvas.width, frozenCanvas.height);

      // スクショ画像でPose評価
      frozenMode = true;
      resumeBtn.disabled = false;

      const tempResults = await new Promise((resolve) => {
        const tempPose = new Pose({
          locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        tempPose.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        tempPose.onResults((results) => resolve(results));
        tempPose.send({ image: frozenCanvas });
      });

      if (tempResults.poseLandmarks) {
        renderEvaluation(tempResults);
      } else {
        drawFrozenBackground();
        info.innerHTML = "人物未検出";
        adviceEl.innerHTML = "アドバイス: -";
      }
    }

    async function startCountdownEvaluation() {
      if (!running) return;

      countdownActive = true;
      frozenMode = false;
      resumeBtn.disabled = true;

      info.innerHTML = "撮影準備中…";
      adviceEl.innerHTML = "アドバイス: -";

      countdownOverlay.style.display = "flex";
      countdownOverlay.textContent = "5";

      let count = 5;
      const timer = setInterval(async () => {
        count -= 1;

        if (count >= 0) {
          countdownOverlay.textContent = String(count);
        }

        if (count < 0) {
          clearInterval(timer);
          countdownOverlay.style.display = "none";
          countdownActive = false;
          await captureCurrentFrame();
        }
      }, 1000);
    }

    function resumeLive() {
      frozenMode = false;
      frozenCanvas = null;
      resumeBtn.disabled = true;
      info.innerHTML = "ライブ表示に戻りました";
      adviceEl.innerHTML = "アドバイス: -";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    startCameraBtn.addEventListener("click", startCamera);
    evalBtn.addEventListener("click", startCountdownEvaluation);
    resumeBtn.addEventListener("click", resumeLive);
  </script>
</body>
</html>
